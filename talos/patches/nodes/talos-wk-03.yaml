# Per-node patch — worker: static IP (no VIP), hostname via HostnameConfig.
machine:
  network:
    interfaces:
      - deviceSelector:
          driver: vmxnet3
        dhcp: false
        addresses:
          - 192.168.216.213/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.216.1
---
apiVersion: v1alpha1
kind: HostnameConfig
$patch: replace
hostname: talos-wk-03

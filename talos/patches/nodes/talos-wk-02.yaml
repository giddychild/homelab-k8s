# Per-node patch — worker: static IP (no VIP), hostname via HostnameConfig.
machine:
  network:
    interfaces:
      - deviceSelector:
          driver: vmxnet3
        dhcp: false
        addresses:
          - 192.168.216.212/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.216.1
  # Dedicated Longhorn data disk: partition + format + mount /dev/sdb (100 GB).
  disks:
    - device: /dev/sdb
      partitions:
        - mountpoint: /var/lib/longhorn
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: talos-wk-02

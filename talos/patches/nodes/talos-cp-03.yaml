# Per-node patch — control-plane, static IP + shared VIP.
machine:
  network:
    hostname: talos-cp-03
    interfaces:
      - deviceSelector:
          driver: vmxnet3
        dhcp: false
        addresses:
          - 192.168.216.203/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.216.1
        vip:
          ip: 192.168.216.200

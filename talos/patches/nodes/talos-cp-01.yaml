# Per-node patch — control-plane: static IP + shared VIP (v1alpha1),
# hostname via HostnameConfig. `$patch: replace` drops the base doc's `auto: stable`
# (Talos forbids setting both `auto` and `hostname`).
machine:
  network:
    interfaces:
      - deviceSelector:
          driver: vmxnet3
        dhcp: false
        addresses:
          - 192.168.216.201/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.216.1
        vip:
          ip: 192.168.216.200
---
apiVersion: v1alpha1
kind: HostnameConfig
$patch: replace
hostname: talos-cp-01

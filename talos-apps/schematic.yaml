# apps-prod — Talos Image Factory schematic (same extensions as homelab-prod).
# Longhorn needs iSCSI + util-linux tooling that stock Talos omits.
#
# The resulting schematic id is referenced directly in the worker node patches
# (machine.install.image), so workers install with these extensions from boot.
# To (re)build / verify the id:
#   curl -X POST --data-binary @talos-apps/schematic.yaml https://factory.talos.dev/schematics
#   -> {"id":"613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245"}
# installer image = factory.talos.dev/installer/<id>:v1.13.2
customization:
  systemExtensions:
    officialExtensions:
      - siderolabs/iscsi-tools
      - siderolabs/util-linux-tools

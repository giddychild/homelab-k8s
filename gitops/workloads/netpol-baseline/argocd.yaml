# Default-deny + scoped allows for the argocd namespace.  Closes the gap
# where any pod could reach argocd-server's UI/API or argocd-repo-server's
# gRPC port (which holds repo creds in memory).
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-default-deny
  namespace: argocd
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          # Enable Cilium DNS proxy so toFQDNs rules (GitHub, Discord)
          # actually match — see monitoring.yaml for the gotcha details.
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints: [ {} ]   # intra-ns (server -> repo-server -> redis, etc.)
    # ArgoCD applies manifests against the kube API — needs apiserver egress.
    - toEntities: ["kube-apiserver"]
---
# argocd-server needs egress to Git (GitHub) + the helm repos it pulls from.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-repo-server-egress-git
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  egress:
    - toFQDNs:
        # Git sources
        - { matchPattern: "*.github.com" }
        - { matchName:    "github.com" }
        - { matchName:    "codeload.github.com" }
        - { matchPattern: "*.githubusercontent.com" }
        - { matchPattern: "ghcr.io" }
        - { matchPattern: "*.ghcr.io" }
        # GitHub Pages used by many helm chart repos (aquasecurity,
        # vmware-tanzu, kubernetes, prometheus-community, grafana, etc).
        - { matchPattern: "*.github.io" }
        # Generic per-vendor Helm repos referenced in app sources
        - { matchName:    "charts.jetstack.io" }
        - { matchName:    "charts.bitnami.com" }
        - { matchName:    "charts.external-secrets.io" }
        - { matchName:    "helm.otwld.com" }              # ollama
        - { matchName:    "helm.openwebui.com" }          # open-webui
        - { matchName:    "helm.releases.hashicorp.com" } # vault
        - { matchName:    "pkgs.tailscale.com" }
        - { matchPattern: "*.grafana.com" }
        - { matchPattern: "*.cnpg.io" }
        - { matchPattern: "*.gitops.dev" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
            - { port: "22",  protocol: TCP }   # git+ssh if used
---
# ingress-nginx -> argocd-server (argocd.apps.giddyland.net).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-allow-ingress-to-server
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
---
# LAN admin to argocd-server (LB IP).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-allow-lan-to-server
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  ingress:
    # fromEntities=world (NOT fromCIDR) per the LoadBalancer-SNAT gotcha
    # documented in ai-ops.yaml.
    - fromEntities: ["world"]
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
---
# argocd-notifications -> Discord (the /code-review trigger path).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-notifications-egress-discord
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-notifications-controller
  egress:
    - toFQDNs:
        - { matchPattern: "*.discord.com" }
        - { matchName:    "discord.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
# argocd-application-controller -> REMOTE Kubernetes clusters (apps cluster
# at 192.168.216.204:6443). The `toEntities: ["kube-apiserver"]` in default-
# deny only covers the LOCAL apiserver — remote clusters that ArgoCD manages
# need their own egress allow. Symptom when missing: money/learnquest apps
# show "ComparisonError: dial tcp <remote-VIP>:6443: i/o timeout".
#
# Using a LAN CIDR (192.168.216.0/24) on 6443 is the safest narrow allow —
# only LAN-internal Kubernetes APIs, not the public internet.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-controller-egress-remote-clusters
  namespace: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  egress:
    - toCIDR:
        - 192.168.216.0/24
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }

# Default-deny + scoped allows for the vault namespace.  Vault is the crown
# jewel — every secret in the cluster comes through here.  Before this:
# any compromised pod cluster-wide could hit vault-0:8200 directly.
# After: only ESO (external-secrets) talks to Vault on 8200; CSI-PV/IP echo
# stays internal; metrics scraping from Prometheus allowed.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-default-deny
  namespace: vault
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # Intra-namespace: vault-0 to itself + raft peers (single-node now but
    # leaves room for HA later). Cluster port 8201 for raft.
    - toEndpoints: [ {} ]
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
            - { port: "8201", protocol: TCP }
    # Vault -> kube-apiserver. REQUIRED for Vault's Kubernetes auth backend:
    # on every ESO login, Vault calls TokenReview on kube-apiserver to verify
    # the SA token before issuing its own token. Without this egress, every
    # ESO request gets `403 permission denied` from the k8s auth method.
    # `kube-apiserver` is a Cilium built-in entity that resolves to the
    # control-plane API endpoints (VIP + per-CP node IPs).
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# Allow ESO controller (external-secrets ns) -> vault:8200.  This is the ONLY
# legit consumer of the Vault API in the cluster.  Everything else uses the
# Kubernetes Secret that ESO writes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-allow-eso
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
---
# Allow ingress-nginx -> vault:8200.  The ClusterSecretStore points ESO at the
# PUBLIC hostname (https://vault.apps.giddyland.net), so every ESO login lands
# on ingress-nginx first and is then proxied to vault-0:8200 cross-namespace.
# Without this policy: nginx logs `upstream timed out (110)`, ESO returns
# `SecretSyncedError`, and every dependent ExternalSecret goes stale.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-allow-ingress-nginx
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
---
# Allow Prometheus scrape of vault metrics (operator surface only).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-allow-prom-scrape
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }
---
# Allow LAN admin (CLI from mgmt-jump on the homelab subnet) to reach the
# Vault UI/API on the LoadBalancer IP. Uses `fromEntities: ["world"]` not
# fromCIDR — see ai-ops-allow-lan-to-ollama for the same Cilium quirk
# (LoadBalancer Cluster-mode SNAT makes LAN source IPs invisible to CIDR
# rules; world entity is the correct selector). Practical scope is LAN
# because the Orbi doesn't port-forward to the LB IP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-allow-lan-admin
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEntities: ["world"]
      toPorts:
        - ports:
            - { port: "8200", protocol: TCP }

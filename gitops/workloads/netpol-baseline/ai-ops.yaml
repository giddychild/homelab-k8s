# Default-deny + scoped allows for the ai-ops namespace (Ollama + Open WebUI).
# Sensitive because Ollama serves model inference to anything that can reach
# port 11434 — currently every pod cluster-wide. After: only money/worker
# (Cilium auth on labels) + learnquest/worker can hit it.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-default-deny
  namespace: ai-ops
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # Intra-namespace (open-webui -> ollama).
    - toEndpoints: [ {} ]
    # Open WebUI uses the kube API for some discovery modes; Ollama doesn't
    # need it but the cost of allowing is zero. Same Vault lesson learned.
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# ingress-nginx -> open-webui (the chat.apps.giddyland.net path).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-allow-ingress-to-webui
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
---
# Cross-namespace workers -> Ollama (the only legit cluster consumers).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-allow-workers-to-ollama
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  ingress:
    - fromEndpoints:
        # money worker (apps-cluster namespace = money)
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: money
            app.kubernetes.io/component: worker
        # learnquest worker
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: learnquest
            app.kubernetes.io/component: worker
        # Open WebUI (intra-ns convenience match too)
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai-ops
            app.kubernetes.io/name: open-webui
      toPorts:
        - ports:
            - { port: "11434", protocol: TCP }
---
# LAN access to Ollama on its LB IP (192.168.216.240). mgmt-jump uses this
# for direct CLI calls without going through the cluster ingress.
#
# IMPORTANT: must be `fromEntities: ["world"]`, NOT `fromCIDR`. With
# externalTrafficPolicy=Cluster on the LoadBalancer service, Cilium SNATs
# the LAN source IP to a node IP before the packet hits the pod — and to
# Cilium's identity model, that translated traffic resolves to the `world`
# entity, not the original CIDR. Verified live: fromCIDR rule dropped the
# traffic; fromEntities=[world] passed it.
#
# Tradeoff: this allows ANY external IP to reach ollama:11434 (including
# from beyond the LAN if the LB IP were ever exposed). Today the LB IP is
# only reachable from inside the LAN because the Orbi doesn't port-forward,
# so practical scope = LAN.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-allow-lan-to-ollama
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  ingress:
    - fromEntities: ["world"]
      toPorts:
        - ports:
            - { port: "11434", protocol: TCP }
---
# Ollama egress — model pulls from registry.ollama.ai.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-ollama-egress-registry
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  egress:
    - toFQDNs:
        - { matchPattern: "*.ollama.ai" }
        - { matchPattern: "registry.ollama.ai" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
# n8n is also in ai-ops — publicly exposed at n8n.apps.giddyland.net
# (container port 5678). Without an allow rule, default-deny breaks n8n.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-allow-ingress-to-n8n
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app: n8n
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "5678", protocol: TCP }
    # LAN admin access to n8n UI (same pattern as Vault/Grafana/Ollama).
    # fromEntities=world per the LoadBalancer-SNAT gotcha documented above.
    - fromEntities: ["world"]
      toPorts:
        - ports:
            - { port: "5678", protocol: TCP }
---
# n8n executes user-defined workflows that call third-party APIs (Discord,
# Anthropic, SaaS webhooks, anything). Enumerating every endpoint isn't
# practical — broad `world` egress on 80/443 is the honest choice; tighten
# to an FQDN allow-list once the active workflow set is audited.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ai-ops-n8n-egress-world
  namespace: ai-ops
spec:
  endpointSelector:
    matchLabels:
      app: n8n
  egress:
    - toEntities: ["world"]
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
            - { port: "80",  protocol: TCP }

# Default-deny + scoped allows for the monitoring namespace (kube-prometheus-
# stack + Loki/Promtail + Alertmanager + resource-digest + n8n).  Prometheus
# needs to scrape EVERYTHING, so its egress allows are broad — the value here
# is preventing inbound from random pods to the dashboards/Alertmanager API.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-default-deny
  namespace: monitoring
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          # rules.dns.matchPattern enables Cilium's DNS proxy so toFQDNs
          # rules (alertmanager-egress-discord, blackbox-egress-world,
          # resource-digest-egress) can map domain names to IPs that the
          # pod actually connects to. Without this, the pod gets a raw
          # IP back and Cilium drops the subsequent connection — manifests
          # as "Policy denied" in hubble.observe even when the toFQDNs
          # rule looks correct in the manifest.
          rules:
            dns:
              - matchPattern: "*"
    # Intra-namespace (Prom -> Alertmanager, Grafana -> Loki, etc.)
    - toEndpoints: [ {} ]
    # kube-prometheus-stack operator + kube-state-metrics talk to the API
    # server constantly. Without this, the operator can't manage Prom/AM
    # CRDs and KSM can't list workloads.  (Prometheus's scrape policy below
    # is broader still; this default-deny edge is for the OTHER pods.)
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# Prometheus needs to scrape every namespace + every node — keep wide.
# ALSO needs intra-namespace ingress on 9090 so Grafana datasource queries
# and resource-digest's PromQL queries work; without this, default-deny
# blocks them and they hang silently.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-prometheus-scrape
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - { port: "9090", protocol: TCP }
  egress:
    - toEntities: ["all"]   # any cluster IP + node IPs (kubelet/cAdvisor)
---
# Promtail needs to tail node logs over the kubelet -- node-IP/10250.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-promtail-egress
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: promtail
  egress:
    - toEntities: ["host", "remote-node"]
    - toEndpoints: [ {} ]   # Loki in-ns
---
# ingress-nginx -> Grafana (grafana.apps.giddyland.net public TLS) AND
# intra-namespace Prometheus -> Grafana scrape (port 3000 /metrics).
# Without the prom rule, Prom shows grafana as DOWN (Cilium drops the
# scrape because once *any* policy selects grafana, default-deny applies).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-ingress-to-grafana
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
        # Intra-namespace Prometheus scrape of grafana /metrics.
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - { port: "3000", protocol: TCP }
---
# LAN admin to Grafana (LB IP) — same pattern as vault.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-lan-to-grafana
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    # fromEntities=world (NOT fromCIDR) per the LoadBalancer-SNAT gotcha
    # documented in ai-ops.yaml.
    - fromEntities: ["world"]
      toPorts:
        - ports:
            - { port: "3000", protocol: TCP }
---
# Alertmanager egress: Discord webhook (FQDN).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-alertmanager-egress-discord
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  egress:
    - toFQDNs:
        - { matchPattern: "*.discord.com" }
        - { matchName:    "discord.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
# resource-digest CronJob egress: Prometheus (in-ns, already in default-deny)
# + Discord webhook. Selector uses `app: resource-digest` (a stable label
# added to the CronJob's pod template) — not the auto-generated
# `job-name: resource-digest-<TS>` which changes every 15 min.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-resource-digest-egress
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app: resource-digest
  egress:
    - toFQDNs:
        - { matchPattern: "*.discord.com" }
        - { matchName:    "discord.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
# blackbox-exporter egress — currently probes
# `https://money.apps.giddyland.net/login` (see Probe `money-endpoints`).
# Allow generic HTTPS egress so additional probe targets work without
# more policy churn. Tighten to specific FQDN list once probe set stabilizes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-blackbox-egress-world
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app: blackbox-exporter
  egress:
    - toEntities: ["world"]
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
            - { port: "80",  protocol: TCP }

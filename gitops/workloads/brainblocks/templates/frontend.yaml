apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brainblocks.name" . }}-frontend
  labels: {{- include "brainblocks.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels: { app: {{ include "brainblocks.name" . }}-frontend }
  template:
    metadata:
      labels: { app: {{ include "brainblocks.name" . }}-frontend }
    spec:
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/{{ .Values.image.frontend }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.frontend.port }} }]
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.frontend.port }} }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "brainblocks.name" . }}-frontend
spec:
  selector: { app: {{ include "brainblocks.name" . }}-frontend }
  ports: [{ port: {{ .Values.frontend.port }}, targetPort: {{ .Values.frontend.port }} }]

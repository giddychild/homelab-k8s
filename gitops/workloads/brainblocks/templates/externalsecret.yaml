{{- if .Values.externalSecret.enabled }}
# ESO pulls secret/brainblocks/app from the homelab Vault (cross-cluster AppRole,
# same vault-backend ClusterSecretStore used by learnquest/money) into a k8s Secret.
# Required key: jwt_secret. cf_tunnel_token only when the Cloudflare Tunnel is on.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: jwt_secret
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: jwt_secret }
    {{- if .Values.cloudflare.tunnel.enabled }}
    - secretKey: cf_tunnel_token
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: cf_tunnel_token }
    {{- end }}
    {{- if .Values.inviteCode.enabled }}
    - secretKey: signup_invite_code
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: signup_invite_code }
    {{- end }}
    {{- if .Values.postgres.backup.enabled }}
    - secretKey: s3_access_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: s3_access_key }
    - secretKey: s3_secret_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: s3_secret_key }
    {{- end }}
{{- end }}

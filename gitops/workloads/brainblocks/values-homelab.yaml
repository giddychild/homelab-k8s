# apps-prod overrides. Image tag bumped by CI / ArgoCD Image Updater.
image:
  tag: "1.0.6"

ingress:
  host: brainblocks.apps.giddyland.net
  clusterIssuer: letsencrypt-prod

# Public access via Cloudflare Tunnel + (optional) Cloudflare Access. The public
# hostname route brainblocks.giddyland.net -> frontend:80 (and /api -> backend:4000)
# is set in the Zero Trust dashboard; only the tunnel token lives here.
# REQUIRES Vault key cf_tunnel_token in secret/brainblocks/app BEFORE this merges,
# or the ESO sync errors.
cloudflare:
  publicHost: brainblocks.giddyland.net
  tunnel:
    enabled: true

externalSecret:
  vaultPath: brainblocks/app
  secretName: brainblocks-secrets

# Shared signup access-code. To turn ON: first add `signup_invite_code` to Vault
# secret/brainblocks/app, THEN set enabled: true (else ESO sync errors). Off for now.
inviteCode:
  enabled: false

# Discord login/signup/failed alerts. Vault key `discord_webhook_url` is set, so this is
# ON: ESO surfaces it into brainblocks-secrets, the API gets DISCORD_WEBHOOK_URL, and a
# Cilium policy allows backend -> discord.com egress.
loginAlerts:
  enabled: true
  # To get a PHONE PUSH on every alert, set this to your numeric Discord user ID as a
  # mention, e.g. "<@123456789012345678>" (Discord -> Settings -> Advanced -> Developer
  # Mode, then Copy User ID). Plain config (not a secret). Empty = no mention.
  mention: ""

# Full default-deny + scoped allows. Rollback: set enabled=false, push — ArgoCD
# removes all CiliumNetworkPolicies in ~60s.
networkPolicy:
  enabled: true

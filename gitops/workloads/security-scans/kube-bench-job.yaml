---
# CIS Kubernetes Benchmark scan via Aqua's kube-bench. On Talos the OS itself
# manages /etc/kubernetes — so we run the "node" + "master" checks read-only and
# write the report to stdout (Job logs). One-shot Job; re-run by deleting +
# reapplying or via `kubectl create job --from=cronjob/...`.
#
# Talos exposes the standard CIS file paths under /etc/kubernetes and the static
# pod manifests under /etc/kubernetes/manifests, so the "k8s-1.27" benchmark
# applies cleanly (Talos targets the latest stable CIS profile).
#
# Apply: kubectl apply -f gitops/workloads/security-scans/kube-bench-job.yaml
# Read:  kubectl logs -n security-scans -l job-name=kube-bench-master --tail=-1
#        kubectl logs -n security-scans -l job-name=kube-bench-node   --tail=-1
apiVersion: v1
kind: Namespace
metadata:
  name: security-scans
  labels:
    # Talos PSS: kube-bench needs hostPID + host filesystem mounts (read-only)
    # to inspect kubelet config + static-pod manifests; that's "privileged".
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-bench-master
  namespace: security-scans
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 604800   # auto-cleanup after 7 days
  template:
    spec:
      restartPolicy: Never
      hostPID: true
      # Run on control-plane nodes only.
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: kube-bench
          image: docker.io/aquasec/kube-bench:v0.12.0
          command: ["kube-bench", "run", "--targets", "master,controlplane,etcd,policies", "--benchmark", "cis-1.9"]
          volumeMounts:
            - { name: var-lib-etcd,         mountPath: /var/lib/etcd,         readOnly: true }
            - { name: var-lib-kubelet,      mountPath: /var/lib/kubelet,      readOnly: true }
            - { name: etc-systemd,          mountPath: /etc/systemd,          readOnly: true }
            - { name: lib-systemd,          mountPath: /lib/systemd/,         readOnly: true }
            - { name: etc-kubernetes,       mountPath: /etc/kubernetes,       readOnly: true }
            - { name: usr-bin,              mountPath: /usr/local/mount-from-host/bin, readOnly: true }
            - { name: etc-cni-netd,         mountPath: /etc/cni/net.d/,       readOnly: true }
            - { name: opt-cni-bin,          mountPath: /opt/cni/bin/,         readOnly: true }
      volumes:
        - { name: var-lib-etcd,    hostPath: { path: /var/lib/etcd } }
        - { name: var-lib-kubelet, hostPath: { path: /var/lib/kubelet } }
        - { name: etc-systemd,     hostPath: { path: /etc/systemd } }
        - { name: lib-systemd,     hostPath: { path: /lib/systemd } }
        - { name: etc-kubernetes,  hostPath: { path: /etc/kubernetes } }
        - { name: usr-bin,         hostPath: { path: /usr/bin } }
        - { name: etc-cni-netd,    hostPath: { path: /etc/cni/net.d/ } }
        - { name: opt-cni-bin,     hostPath: { path: /opt/cni/bin/ } }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-bench-node
  namespace: security-scans
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 604800
  # Run on EVERY node via the trick: spawn one pod per node by parallelism.
  # Simpler: one Job, runs on whichever worker schedules it. Re-run for coverage.
  template:
    spec:
      restartPolicy: Never
      hostPID: true
      containers:
        - name: kube-bench
          image: docker.io/aquasec/kube-bench:v0.12.0
          command: ["kube-bench", "run", "--targets", "node", "--benchmark", "cis-1.9"]
          volumeMounts:
            - { name: var-lib-kubelet, mountPath: /var/lib/kubelet, readOnly: true }
            - { name: etc-systemd,     mountPath: /etc/systemd,     readOnly: true }
            - { name: lib-systemd,     mountPath: /lib/systemd/,    readOnly: true }
            - { name: etc-kubernetes,  mountPath: /etc/kubernetes,  readOnly: true }
            - { name: usr-bin,         mountPath: /usr/local/mount-from-host/bin, readOnly: true }
      volumes:
        - { name: var-lib-kubelet, hostPath: { path: /var/lib/kubelet } }
        - { name: etc-systemd,     hostPath: { path: /etc/systemd } }
        - { name: lib-systemd,     hostPath: { path: /lib/systemd } }
        - { name: etc-kubernetes,  hostPath: { path: /etc/kubernetes } }
        - { name: usr-bin,         hostPath: { path: /usr/bin } }

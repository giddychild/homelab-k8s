{{- if .Values.persistence.enabled }}
# One RWO volume holds the SQLite DB and all uploaded files. This is the single
# thing to back up (Velero covers PVCs). Do not run more than one pod against it.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "deuce.name" . }}-data
  labels: {{- include "deuce.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}

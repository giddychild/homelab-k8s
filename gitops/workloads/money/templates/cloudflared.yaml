{{- if .Values.cloudflare.tunnelEnabled }}
# Cloudflare Tunnel — exposes the app at a public hostname (e.g.
# money.giddyland.net) WITHOUT opening inbound ports. cloudflared dials out to
# Cloudflare; the public-hostname → service routing is configured in the
# Cloudflare Zero Trust dashboard (remotely-managed tunnel). Point the public
# hostname at the cluster ingress with an HTTP Host Header override of
# {{ .Values.ingress.host }} so the existing money Ingress routes web + /api/v1.
# See docs/runbooks/money-cloudflare-tunnel.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.cloudflare.tunnelTokenVaultPath }}
        property: token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "money.fullname" . }}-cloudflared
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cloudflare.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "money.selectorLabels" (dict "ctx" . "component" "cloudflared") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "money.selectorLabels" (dict "ctx" . "component" "cloudflared") | nindent 8 }}
    spec:
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflare.image | quote }}
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
{{- end }}

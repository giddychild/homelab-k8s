apiVersion: v1
kind: Service
metadata:
  name: {{ include "money.api.fullname" . }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "money.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}

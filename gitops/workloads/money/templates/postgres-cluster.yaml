apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "money.pg.fullname" . }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
  annotations:
    # Wave -5 so postgres is up (Health=Ready, which CNPG reports only once
    # primary is accepting connections — INCLUDING after recovery completes)
    # before migrate (wave 5) tries to mount money-pg-app and run Alembic.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.image }}

  storage:
    size: {{ .Values.postgres.storage.size }}
    storageClass: {{ .Values.postgres.storage.storageClass }}

{{- if .Values.postgres.recover.enabled }}
  # External cluster definition pointing at the S3 backups CNPG/Barman wrote
  # under the OLD cluster's serverName. The new cluster bootstraps by replaying
  # the most recent base backup + WAL files instead of running initdb.
  externalClusters:
    - name: source-cluster
      barmanObjectStore:
        serverName: {{ .Values.postgres.recover.serverName | quote }}
        destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
        endpointURL: {{ .Values.postgres.backup.endpointURL | quote }}
        s3Credentials:
          accessKeyId:
            name: {{ .Values.postgres.backup.s3CredentialsSecret }}
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: {{ .Values.postgres.backup.s3CredentialsSecret }}
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
{{- end }}

  bootstrap:
{{- if .Values.postgres.recover.enabled }}
    # PITR / latest recovery from the S3 base backup + WAL stream. Replaces the
    # initdb path while recover.enabled is true; after restore succeeds, set it
    # back to false in a follow-up commit (CNPG only honors bootstrap on initial
    # cluster create, so leaving on is harmless — but cleaner off).
    recovery:
      source: source-cluster
      {{- if .Values.postgres.recover.targetTime }}
      recoveryTarget:
        targetTime: {{ .Values.postgres.recover.targetTime | quote }}
      {{- end }}
{{- else }}
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.owner }}
      # Create pgvector in the APPLICATION database as superuser. Must be
      # postInitApplicationSQL (runs in {{ .Values.postgres.database }}), NOT
      # postInitSQL (which runs in the 'postgres' db) — the app user isn't a
      # superuser, so the Alembic migration can't create the extension itself.
      postInitApplicationSQL:
        - "CREATE EXTENSION IF NOT EXISTS vector;"
{{- end }}

  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      {{- if .Values.postgres.backup.serverName }}
      # Explicit serverName for THIS cluster's WAL archive + base backups.
      # Defaults to the Cluster's metadata.name when unset. MUST be set to
      # something different from recover.serverName when restoring in place,
      # otherwise CNPG's "WAL archive check" sees the source's existing WALs
      # under the same S3 prefix and aborts with "Expected empty archive".
      serverName: {{ .Values.postgres.backup.serverName | quote }}
      {{- end }}
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      endpointURL: {{ .Values.postgres.backup.endpointURL | quote }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.postgres.backup.s3CredentialsSecret }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.postgres.backup.s3CredentialsSecret }}
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"
  {{- end }}

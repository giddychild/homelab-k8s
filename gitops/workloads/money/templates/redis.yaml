apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "money.redis.fullname" . }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.redis.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.redis.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "money.redis.fullname" . }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "money.selectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "money.selectorLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: {{ .Values.redis.port }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "money.redis.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "money.redis.fullname" . }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "money.selectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}

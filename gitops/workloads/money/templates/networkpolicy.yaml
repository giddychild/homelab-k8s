{{- if .Values.networkPolicy.enabled }}
# Full default-deny + explicit-allow zero-trust for the money namespace.
# Closes the gaps the v1 scaffold had: ingress-nginx->web, cloudflared->web,
# migrate->postgres, CNPG operator->postgres, postgres->S3 (barman), and DNS.
# Cilium CRDs (cilium.io/v2). Each policy is the minimum allow for one edge.
---
# 1) Default-deny: ingress none, egress DNS + intra-ns + kube-apiserver.
#    Every cross-namespace + external allow is additive in other policies.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-default-deny
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          # Cilium DNS proxy — REQUIRED for toFQDNs rules in this chart
          # (cloudflared-egress -> *.cloudflare.com, postgres-to-s3 ->
          # s3.amazonaws.com) to actually match the resolved IPs.
          # Without this, every FQDN-targeted connection gets dropped
          # silently. See docs/runbooks/network-policy-rollout.md.
          rules:
            dns:
              - matchPattern: "*"
    # Intra-namespace egress on any port — web -> api, api -> redis service
    # IP, etc. Without this, default-deny blocks every cross-component call
    # and we'd need an explicit allow per edge (api->redis, web->api, etc).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    # kube-apiserver egress (preemptive — CNPG instance pods + Cilium
    # identity-aware libraries occasionally need it).
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# 2) ingress-nginx -> web (the LAN-served path; web also serves the BFF proxy
#    that calls api internally, so api stays cluster-internal only).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-ingress-to-web
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: web
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
---
{{- if .Values.cloudflare.tunnelEnabled }}
# 2b) cloudflared -> web (Cloudflare Tunnel currently points the public hostname
#     at the ingress; if you flip it to point directly at the money web service,
#     this is what lets it through. Harmless to keep either way.)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-cloudflared-to-web
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: web
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: cloudflared
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
---
# 2c) cloudflared egress: to ingress-nginx (the documented routing) + to
#     Cloudflare's edge (FQDN selector — Cilium DNS-aware policy).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-cloudflared-egress
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: cloudflared
  egress:
    # ingress-nginx (in case the tunnel hits the ingress, not web directly)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "80",  protocol: TCP }
            - { port: "443", protocol: TCP }
    # web service direct
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: web
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
    # Cloudflare edge — tunnel uses 7844 (QUIC/h2) + 443 fallback.
    - toFQDNs:
        - { matchPattern: "*.cloudflare.com" }
        - { matchPattern: "*.cftunnel.com" }
        - { matchPattern: "*.argotunnel.com" }
      toPorts:
        - ports:
            - { port: "443",  protocol: TCP }
            - { port: "7844", protocol: TCP }
            - { port: "7844", protocol: UDP }
---
{{- end }}
# 3) web -> api (BFF proxy in web container forwards browser calls to api).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-web-to-api
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: web
      toPorts:
        - ports:
            - { port: "{{ .Values.api.port }}", protocol: TCP }
---
# 4) api + worker + migrate -> postgres + redis.
#    "migrate" was excluded from the v1 scaffold — Alembic migrations PreSync
#    Job needs postgres or ArgoCD sync wedges. Added here.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-app-to-data
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["api", "worker", "migrate"]
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "money.pg.fullname" . }}
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: redis
      toPorts:
        - ports:
            - { port: "{{ .Values.redis.port }}", protocol: TCP }
---
# 5) worker -> Ollama on the homelab LAN (the AI factory's offline pipeline).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-worker-to-ollama
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  egress:
    - toCIDR:
        - {{ .Values.networkPolicy.ollamaCidr }}
      toPorts:
        - ports:
            - { port: "11434", protocol: TCP }
---
# 6) Postgres ingress — CNPG operator (cnpg-system), money app pods
#    (api/worker/migrate), AND intra-cluster Postgres traffic (replica ->
#    primary, pooler -> instances, etc).  Without the money-app rule, the
#    app-to-data egress allow has no matching ingress and connections drop.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-pg-ingress
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "money.pg.fullname" . }}
  ingress:
    # CNPG operator from cnpg-system
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }   # /metrics + /healthz
            - { port: "9187", protocol: TCP }   # postgres-exporter
    # money app pods (api/worker/migrate) in this namespace
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/component
              operator: In
              values: ["api", "worker", "migrate"]
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    # Intra-Postgres-cluster traffic (replica streaming, etc).
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "money.pg.fullname" . }}
---
# 6b) Redis ingress — api + worker need to reach it.  Same situation as
#     postgres: default-deny selects redis (instance label match) and
#     denies all ingress unless explicitly allowed here.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-redis-ingress
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: redis
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/component
              operator: In
              values: ["api", "worker"]
      toPorts:
        - ports:
            - { port: "{{ .Values.redis.port }}", protocol: TCP }
---
{{- if .Values.postgres.backup.enabled }}
# 7) postgres -> S3 (barman base-backup + WAL archive). FQDN selector keeps it
#    tight: only AWS S3 endpoints, only 443.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-pg-to-s3
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "money.pg.fullname" . }}
  egress:
    - toFQDNs:
        - { matchPattern: "s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.amazonaws.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
{{- end }}
---
# 8) Prometheus scrape — money has a ServiceMonitor (when enabled). Allow
#    kube-prometheus-stack to scrape api + worker /metrics. No-op if SM is off.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "money.fullname" . }}-prom-scrape
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["api", "worker"]
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - { port: "{{ .Values.api.port }}", protocol: TCP }
{{- end }}

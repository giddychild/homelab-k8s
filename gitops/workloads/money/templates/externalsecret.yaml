{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  labels:
    {{- include "money.labels" . | nindent 4 }}
  annotations:
    # Wave -5 so this materializes (and Health=Ready means ESO has synced the
    # secret from Vault) before the migrate job (wave 5) starts. money.appEnv
    # mounts keys from this secret.
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
  data:
    # NOTE: database_url is intentionally NOT pulled from Vault. The chart's
    # appEnv helper assembles DATABASE_URL at runtime from CNPG's auto-managed
    # money-pg-app secret (which always matches the live DB password) — see
    # _helpers.tpl. Storing it in Vault drifts every time CNPG regenerates the
    # password (e.g. on bootstrap.recovery), so we don't.
    - secretKey: redis_url
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: redis_url
    - secretKey: jwt_private_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: jwt_private_key
    - secretKey: jwt_public_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: jwt_public_key
{{- if .Values.externalSecrets.credentialKey }}
    - secretKey: credential_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: credential_key
{{- end }}
{{- if .Values.externalSecrets.discordWebhook }}
    - secretKey: discord_webhook_url
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: discord_webhook_url
{{- end }}
{{- if .Values.externalSecrets.smtpPassword }}
    - secretKey: smtp_password
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: smtp_password
{{- end }}
{{- if .Values.externalSecrets.storage }}
    - secretKey: storage_access_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: storage_access_key
    - secretKey: storage_secret_key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: storage_secret_key
{{- end }}
{{- end }}

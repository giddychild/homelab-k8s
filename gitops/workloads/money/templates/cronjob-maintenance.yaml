{{- if .Values.maintenance.enabled }}
# Disabled by default: the original `app.manage nightly` entrypoint was never
# implemented and crash-looped every night. The monthly review now runs from
# ARQ's own cron inside the worker (see app/workers/settings.py); the other
# nightly enqueues (materialize_recurring, embed_transactions, run_forecast)
# are still stubs. Enable this only once `command` below points at something
# real.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "money.fullname" . }}-maintenance
  labels:
    {{- include "money.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.maintenance.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
          containers:
            - name: maintenance
              image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: {{ .Values.maintenance.command | toJson }}
              env:
                {{- include "money.appEnv" . | nindent 16 }}
{{- end }}

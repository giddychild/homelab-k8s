# Apps-cluster overrides for the homelab (Dell R730XD / ESXi).
# Applied by ArgoCD on top of values.yaml.

# Locally-built images pushed to GHCR (private; pulled via ghcr-pull secret).
image:
  api:
    tag: "0.25.2"
  web:
    tag: "0.25.2"

# Vault path aligned to the apps-prod AppRole policy (secret/data/money/*).
# Secret lives at secret/money/app with properties:
#   database_url, redis_url, jwt_private_key, jwt_public_key
externalSecrets:
  vaultPath: "money/app"
  # Flip to true AFTER adding a `credential_key` (Fernet) to Vault secret/money/app,
  # then ESO syncs it and saved bill logins (username/password) get encrypted.
  # Leave false until provisioned, or ESO errors on the missing Vault property.
  credentialKey: true
  # smtp_password is in Vault (Gmail app password) → sync it for email reset.
  smtpPassword: true

# Email-based password reset via Gmail SMTP.
email:
  enabled: true
  smtpHost: "smtp.gmail.com"
  smtpPort: 587
  smtpUser: "seyi.obadee@gmail.com"
  smtpFrom: "Money <seyi.obadee@gmail.com>"
  startTls: true

api:
  replicas: 2
web:
  replicas: 2
worker:
  replicas: 1

ai:
  # Ollama runs on the ai-ops node pool; reachable in-cluster.
  ollamaUrl: "http://192.168.216.240:11434"
  externalAiEnabled: false

ingress:
  host: money.apps.giddyland.net
  clusterIssuer: letsencrypt-prod

postgres:
  instances: 2
  # "system" flavor = standard (incl. pgvector) PLUS barman-cloud binaries, which
  # the in-tree barmanObjectStore backup needs (the "standard" image lacks them →
  # "barman-cloud-backup: not found"). system is deprecated long-term; the future
  # path is the Barman Cloud Plugin, but this keeps backups working today.
  image: ghcr.io/cloudnative-pg/postgresql:16-system-bookworm
  storage:
    storageClass: longhorn-r2
    size: 20Gi
  backup:
    # CNPG Barman → AWS S3 (base backups + WAL archiving = point-in-time recovery).
    # Flip to true AFTER the user-side steps in docs/runbooks/money-db-backups.md:
    #   1. create a DEDICATED bucket (NOT the Velero bucket — sharing its root
    #      breaks Velero's BSL) + a scoped IAM user
    #   2. write access_key_id / secret_access_key to Vault secret/money/backup-s3
    # Then ESO syncs money-pg-backup-s3 and CNPG starts archiving.
    enabled: true
    destinationPath: "s3://giddyland-money-pg-backups/"
    endpointURL: "https://s3.us-east-1.amazonaws.com"
    s3CredentialsVaultPath: "money/backup-s3"

redis:
  storage:
    storageClass: longhorn-r1

# Network policies — full default-deny + scoped allows for money. Template
# rewritten in the 2026-05-28 security pass: DNS proxy enabled (cloudflared
# FQDN egress to *.cloudflare.com works), intra-namespace egress allowed
# (web -> api), postgres + redis ingress allows for api/worker/migrate.
# Rollback: set enabled=false, push — ArgoCD removes all CNPs in ~60s.
networkPolicy:
  enabled: true
  ollamaCidr: "192.168.216.0/24"

# apps-prod has no Prometheus operator yet, so the ServiceMonitor CRD is absent.
# Disable until monitoring is added to apps-prod (or it's federated to homelab).
monitoring:
  serviceMonitor:
    enabled: false

# Seed + enable the shared demo account on apps-prod.
demo:
  seedEnabled: true

# Invite-only sign-up for the public deployment. Set adminEmails to YOUR money
# login email (must match exactly) so you can generate/revoke invite codes.
registrationMode: "invite"
adminEmails: "seyiobadina@yahoo.com"

# Public exposure via Cloudflare Tunnel (token in Vault secret/money/cf-tunnel).
cloudflare:
  tunnelEnabled: true

# In-cluster MinIO for receipt photo storage. Flip these to true together with
# externalSecrets.storage AFTER writing storage_access_key + storage_secret_key
# to Vault secret/money/app — see docs/runbooks/money-receipts-storage.md.
minio:
  enabled: false
storage:
  enabled: false
  endpointUrl: "http://money-minio.money.svc.cluster.local:9000"
  bucket: "money-receipts"
# Tied to the same Vault keys as MinIO; flip on once both are present.
# externalSecrets:
#   storage: true

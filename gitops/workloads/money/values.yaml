# Default values for the money chart. Overridden per-environment by
# values-homelab.yaml on the apps cluster.

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: ghcr-pull
  api:
    repository: ghcr.io/giddychild/money-api
    tag: "latest" # bumped to :<sha> by the release workflow
  web:
    repository: ghcr.io/giddychild/money-web
    tag: "latest"

api:
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Optional, local-only AI. Reached over the LAN/cluster; app works if it's down.
ai:
  ollamaUrl: "http://ollama.ai-ops.svc.cluster.local:11434"
  externalAiEnabled: false

ingress:
  enabled: true
  className: nginx
  host: money.apps.giddyland.net
  clusterIssuer: letsencrypt-prod
  tlsSecretName: money-tls

# External Secrets Operator: pulls from Vault via a ClusterSecretStore.
externalSecrets:
  enabled: true
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: "1h"
  # Keys expected in Vault under this path.
  vaultPath: "apps/money"
  targetSecretName: money-secrets
  # Pull a Fernet `credential_key` for encrypting saved bill logins. Enable only
  # once that property exists in Vault (else ESO errors on the missing key).
  credentialKey: false
  # Pull a `discord_webhook` (login/sign-up alerts). Enable once it's in Vault.
  discordWebhook: false
  # Pull an `smtp_password` (password-reset emails). Enable once it's in Vault.
  smtpPassword: false

# CloudNativePG cluster.
postgres:
  instances: 2
  image: ghcr.io/cloudnative-pg/postgresql:16-bookworm-pgvector
  storage:
    size: 10Gi
    storageClass: longhorn-r2
  database: money
  owner: money
  backup:
    enabled: true
    destinationPath: "s3://money-pg-backups/"
    endpointURL: "https://s3.giddyland.net"
    s3CredentialsSecret: money-pg-backup-s3
    # Vault path (KV v2) holding access_key_id / secret_access_key for the backup
    # bucket's IAM user; ESO materializes it into s3CredentialsSecret.
    s3CredentialsVaultPath: "money/backup-s3"
    # CNPG 6-field cron (seconds first) — daily base backup at 03:30.
    schedule: "0 30 3 * * *"

redis:
  image: redis:7-alpine
  storage:
    size: 2Gi
    storageClass: longhorn-r1
  port: 6379

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s

networkPolicy:
  enabled: true
  # CIDR/identity for the Ollama host on the LAN (egress allow).
  ollamaCidr: "10.0.20.0/24"

# Public demo/sandbox account (seeded at startup by the API; testers can reset it).
demo:
  seedEnabled: false

# Self-registration mode: "closed" | "invite" | "open".
#   closed — sign-up disabled (only existing accounts + demo log in)
#   invite — sign-up requires a single-use invite code (admins generate them)
#   open   — anyone can sign up
registrationMode: "closed"
# Comma-separated admin emails (can generate/revoke invite codes). Must match a
# user's login email exactly (case-insensitive).
adminEmails: ""

# Cloudflare Tunnel — public exposure via Zero Trust (no inbound ports).
# Disabled by default. Enable AFTER creating the tunnel + storing its token in
# Vault (see docs/runbooks/money-cloudflare-tunnel.md). The public-hostname →
# service route (with an HTTP Host Header override of ingress.host) is set in
# the Cloudflare dashboard.
cloudflare:
  tunnelEnabled: false
  image: cloudflare/cloudflared:2026.5.2
  replicas: 2
  tunnelTokenVaultPath: "money/cf-tunnel"

# Email (SMTP) for password-reset links. Disabled by default. Enable AFTER
# storing smtp_password in Vault + externalSecrets.smtpPassword: true.
# See docs/runbooks/money-email-reset.md. Default host = Gmail SMTP.
email:
  enabled: false
  smtpHost: "smtp.gmail.com"
  smtpPort: 587
  smtpUser: ""        # e.g. your.account@gmail.com
  smtpFrom: ""        # e.g. "Money <your.account@gmail.com>"
  startTls: true
# Base URL used in reset-link emails (the public hostname).
publicBaseUrl: "https://money.giddyland.net"

{{- if .Values.externalSecret.enabled }}
# ESO pulls secret/careledger/app from the homelab Vault (cross-cluster AppRole,
# the same vault-backend ClusterSecretStore used by brainblocks/learnquest/money)
# into a k8s Secret. Required keys: auth_secret, vault_key, join_code.
# cf_tunnel_token is only needed when the Cloudflare Tunnel is enabled.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: auth_secret
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: auth_secret }
    - secretKey: vault_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: vault_key }
    - secretKey: join_code
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: join_code }
    {{- if .Values.cloudflare.tunnel.enabled }}
    - secretKey: cf_tunnel_token
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: cf_tunnel_token }
    {{- end }}
{{- end }}

{{- if .Values.cloudflare.tunnel.enabled }}
# Cloudflare Tunnel (remotely-managed). cloudflared dials OUT to Cloudflare's edge
# (no inbound ports, home IP hidden). The public hostname route
# (care.giddyland.net -> careledger:{{ .Values.app.port }}) and any Cloudflare
# Access policy are configured in the Zero Trust dashboard; this Deployment only
# needs the tunnel token (Vault -> ESO -> careledger-secrets).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "careledger.name" . }}-cloudflared
  labels: {{- include "careledger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cloudflare.tunnel.replicas | default 2 }}
  selector:
    matchLabels: { app: {{ include "careledger.name" . }}-cloudflared }
  template:
    metadata:
      labels: { app: {{ include "careledger.name" . }}-cloudflared }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: cloudflared
          image: "{{ .Values.cloudflare.tunnel.image }}"
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.secretName }}
                  key: cf_tunnel_token
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: 2000 }
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
{{- end }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recall-redis
  labels:
    {{- include "recall.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: recall-redis
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: redis }
  template:
    metadata:
      labels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.redis.storageClass }}
        resources:
          requests:
            storage: {{ .Values.redis.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: recall-redis
  labels:
    {{- include "recall.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: recall, app.kubernetes.io/component: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-api
  labels:
    {{- include "recall.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: api }
    spec:
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ include "recall.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - { name: http, containerPort: 8000 }
          env:
            {{- include "recall.appEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "recall.secretVolumeMounts" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        {{- include "recall.secretVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: recall-api
  labels:
    {{- include "recall.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: recall, app.kubernetes.io/component: api }
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- if .Values.api.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recall-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: recall-api }
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }} }
{{- end }}

{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: recall-migrate
  labels:
    {{- include "recall.labels" . | nindent 4 }}
  annotations:
    # PostSync (NOT PreSync): PreSync deadlocks against the CNPG/ESO secrets created in the
    # main sync. hook-succeeded keeps the namespace clean between deploys.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: migrate }
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: {{ include "recall.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Retry alembic until the DB accepts connections and the migration succeeds.
              n=0
              until alembic upgrade head; do
                n=$((n+1))
                if [ "$n" -ge 30 ]; then echo "migration failed after $n attempts"; exit 1; fi
                echo "db not ready, retry $n"; sleep 5
              done
              {{- if .Values.migrate.runSeed }}
              python -m app.seed || echo "seed warning (continuing)"
              {{- end }}
          env:
            {{- include "recall.appEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "recall.secretVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "recall.secretVolumes" . | nindent 8 }}
{{- end }}

{{- if .Values.cloudflare.tunnel.enabled }}
# Public access at recall.giddyland.net. The recall web image bakes API_INTERNAL_URL and proxies
# /api itself, so the tunnel's public-hostname (configured in the CF dashboard) points straight at
# the web Service — HTTP http://recall-web.recall.svc.cluster.local:3000 — no Host-header/SNI or
# split-route hack needed (unlike money/learnquest). Token comes from Vault via ESO.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-cloudflared
  labels:
    {{- include "recall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudflared
spec:
  replicas: {{ .Values.cloudflare.tunnel.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: cloudflared }
  template:
    metadata:
      labels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: cloudflared }
    spec:
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflare.tunnel.image }}
          args: ["tunnel", "--no-autoupdate", "run", "--token", "$(TUNNEL_TOKEN)"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef: { name: recall-secrets, key: cf_tunnel_token }
{{- end }}

{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall-web
  labels:
    {{- include "recall.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: web }
  template:
    metadata:
      labels: { app.kubernetes.io/name: recall, app.kubernetes.io/component: web }
    spec:
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: web
          image: {{ include "recall.webImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - name: API_INTERNAL_URL
              value: "http://recall-api:8000"
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: recall-web
  labels:
    {{- include "recall.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: recall, app.kubernetes.io/component: web }
  ports:
    - { name: http, port: 3000, targetPort: http }
{{- end }}

# ExternalSecret — Discord webhook for ArgoCD Notifications.
# ArgoCD's notifications controller resolves `$discord-url` from this secret
# (argocd-notifications-secret). The chart is told not to create it (secret.create
# false) so ESO owns it. URL comes from Vault — never in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: discord-url
      remoteRef:
        key: alert-webhook        # secret/alert-webhook
        property: discord_url

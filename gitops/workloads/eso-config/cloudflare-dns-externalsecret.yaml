# ExternalSecret — Cloudflare API token (DNS edit, giddyland.net zone) for
# cert-manager's ACME DNS-01 solver. Pulled from Vault; never in Git.
# Lands in the cert-manager namespace, where the ClusterIssuers look for it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-dns        # secret/cloudflare-dns
        property: api_token

# ExternalSecret — pulls secret/velero from Vault and templates the AWS-style
# credentials file Velero reads (Secret `velero-credentials`, key `cloud`).
# No secret data in Git — only the reference to Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero          # created by the velero App (CreateNamespace=true)
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Velero's chart mounts this Secret and points AWS_SHARED_CREDENTIALS_FILE
        # at the `cloud` key, which must be an AWS credentials-file INI.
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: velero          # path under the "secret" KV mount → secret/velero
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: velero
        property: secret_access_key

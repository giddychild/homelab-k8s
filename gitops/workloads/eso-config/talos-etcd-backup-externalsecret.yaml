# ExternalSecret — pulls the least-privilege (os:etcd-backup) talosconfig from
# Vault and materializes the `talos-etcd-backup` Secret the etcd-snapshot CronJob
# mounts. No credential in Git — only the reference to Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: talos-etcd-backup
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: talos-etcd-backup
    creationPolicy: Owner
  data:
    - secretKey: config
      remoteRef:
        key: talos-etcd-backup     # secret/talos-etcd-backup
        property: talosconfig

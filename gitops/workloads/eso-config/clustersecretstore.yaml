# ClusterSecretStore — tells ESO how to reach Vault (cluster-wide).
# Authenticates via Vault's Kubernetes auth method using the ESO ServiceAccount,
# mapped to the `eso` Vault role/policy we created.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"          # KV v2 mount
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"

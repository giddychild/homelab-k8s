# ExternalSecret — pulls secret/tailscale from Vault and materializes the
# `operator-oauth` Secret the Tailscale operator reads its OAuth client creds from.
# No secret data in Git — only the reference to Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale       # created by the tailscale-operator App (CreateNamespace=true)
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: operator-oauth     # the K8s Secret ESO creates/owns; chart expects this name
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: tailscale       # path under the "secret" KV mount → secret/tailscale
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: tailscale
        property: client_secret

# ExternalSecret — pulls secret/grafana from Vault and materializes the
# `grafana-admin` Kubernetes Secret that kube-prometheus-stack's Grafana reads.
# No secret data in Git — only the reference to Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin      # the K8s Secret ESO creates/owns
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana         # path under the "secret" KV mount → secret/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: grafana
        property: admin-password

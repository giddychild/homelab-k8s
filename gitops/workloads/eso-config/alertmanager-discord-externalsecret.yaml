# ExternalSecret — Discord incoming-webhook URL for Alertmanager notifications.
# Pulled from Vault; mounted into Alertmanager (alertmanagerSpec.secrets) and read
# via discord_configs.webhook_url_file so the URL never lands in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord
    creationPolicy: Owner
  data:
    - secretKey: discord_url
      remoteRef:
        key: alert-webhook        # secret/alert-webhook
        property: discord_url

# apps-prod overrides. Image tags bumped by CI / ArgoCD Image Updater.
image:
  tag: "0.2.9"

postgres:
  backup:
    enabled: false   # P0: off. Enable with S3 creds (Velero covers PG via WAL later).

ingress:
  host: learn.apps.giddyland.net
  clusterIssuer: letsencrypt-prod

# Public share for the cousins goes via Cloudflare Tunnel + Access (below), which
# adds an edge auth layer (email allow-list) + WAF in front of the app. Tailscale
# Funnel left available but OFF (Cloudflare is the chosen public path).
tailscale:
  enabled: false
  funnel: false
  hostname: learnquest

# Cloudflare Tunnel: cloudflared dials out to Cloudflare's edge (no inbound ports,
# home IP hidden). The public hostname route (learn.giddyland.net -> web:3000) and
# the Cloudflare Access policy (email allow-list) are set in the Zero Trust
# dashboard; only the tunnel token is needed here (Vault key cf_tunnel_token).
cloudflare:
  tunnel:
    enabled: true

# Public-URL guards: ping Discord on every sign-in/signup/failure, and require an
# invite code to register. Needs Vault keys discord_webhook_url + signup_invite_code
# in secret/learnquest/app BEFORE this merges (else ESO sync errors).
loginAlerts:
  enabled: true
inviteCode:
  enabled: true
# Question-bank curation restricted to the admin allowlist (Vault key admin_emails,
# e.g. your email). Add it to Vault BEFORE this merges, or ESO errors.
adminAuth:
  enabled: true

externalSecret:
  vaultPath: learnquest/app
  secretName: learnquest-secrets

# P1: the installable PWA web shell exists (iPad home-screen icon). Web is ON;
# ingress routes / -> web and /api -> api. Requires the web image in GHCR.
web:
  enabled: true

# P0 hardening deferred (mirror money's first deploy): tighten after the loop works.
networkPolicy:
  enabled: false
monitoring:
  serviceMonitor:
    enabled: false

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "learnquest.name" . }}-worker
  labels: {{- include "learnquest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels: { app: {{ include "learnquest.name" . }}-worker }
  template:
    metadata:
      labels: { app: {{ include "learnquest.name" . }}-worker }
    spec:
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/{{ .Values.image.api }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["arq", "apps.worker.worker.WorkerSettings"]
          env: {{- include "learnquest.appEnv" . | nindent 12 }}
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}

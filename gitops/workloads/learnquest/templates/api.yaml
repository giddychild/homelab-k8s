apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "learnquest.name" . }}-api
  labels: {{- include "learnquest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: {{ include "learnquest.name" . }}-api }
  template:
    metadata:
      labels: { app: {{ include "learnquest.name" . }}-api }
    spec:
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/{{ .Values.image.api }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: {{ .Values.api.port }} }]
          env: {{- include "learnquest.appEnv" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "learnquest.name" . }}-api
spec:
  selector: { app: {{ include "learnquest.name" . }}-api }
  ports: [{ port: 8000, targetPort: {{ .Values.api.port }} }]

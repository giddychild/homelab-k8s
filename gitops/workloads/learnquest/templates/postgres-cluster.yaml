# CloudNativePG cluster. pgvector ships in the "standard" image flavor; the
# extension is created as superuser via postInitApplicationSQL (the app user
# cannot CREATE EXTENSION) — same fix as the money platform.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "learnquest.name" . }}-pg
  labels: {{- include "learnquest.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.image }}
  storage:
    storageClass: {{ .Values.postgres.storageClass }}
    size: {{ .Values.postgres.size }}
  bootstrap:
    initdb:
      database: learnquest
      owner: learnquest
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath }}
      s3Credentials:
        accessKeyId: { name: {{ .Values.externalSecret.secretName }}, key: s3_access_key }
        secretAccessKey: { name: {{ .Values.externalSecret.secretName }}, key: s3_secret_key }
    retentionPolicy: "30d"
  {{- end }}

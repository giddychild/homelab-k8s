# Alembic migrations as an ArgoCD PostSync hook.
#
# MUST be PostSync, not PreSync: the migration depends on the CNPG Postgres
# (its generated `learnquest-pg-app` secret + the `-pg-rw` service) and on the
# ESO-materialised `learnquest-secrets`, both of which are created in the MAIN
# sync. A PreSync hook runs *before* those exist -> the pod sits in
# CreateContainerConfigError and the whole sync deadlocks. PostSync runs after
# the DB + secrets are up; the retry loop tolerates CNPG still electing a primary.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "learnquest.name" . }}-migrate
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        # Stable label so CiliumNetworkPolicy can select the migrate pod
        # alongside api/web/worker (this chart uses `app: learnquest-<X>`,
        # NOT `app.kubernetes.io/component`). Without it migrate has only
        # auto-generated job-name labels, no policy matches, and pg-ingress
        # drops the connection → "db not ready yet" timeout loop.
        app: {{ include "learnquest.name" . }}-migrate
    spec:
      restartPolicy: Never
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      containers:
        - name: migrate
          image: "{{ .Values.image.registry }}/{{ .Values.image.api }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 40); do
                if alembic upgrade head; then
                  # Migrations succeeded (the critical part). Seed is BEST-EFFORT:
                  # a seed bug must never wedge the deploy, so we log + exit 0.
                  python -m app.seed || echo "WARNING: seed failed (non-fatal), continuing"
                  exit 0
                fi
                echo "db not ready yet (attempt $i), retrying in 5s..."
                sleep 5
              done
              echo "migrations failed after retries"; exit 1
          env: {{- include "learnquest.appEnv" . | nindent 12 }}

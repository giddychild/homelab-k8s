{{- if .Values.externalSecret.enabled }}
# ESO pulls secret/learnquest/app from the homelab Vault (cross-cluster AppRole,
# same vault-backend ClusterSecretStore used by money) into a k8s Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: jwt_private_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: jwt_private_key }
    - secretKey: jwt_public_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: jwt_public_key }
    - secretKey: anthropic_api_key
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: anthropic_api_key }
    {{- if .Values.cloudflare.tunnel.enabled }}
    - secretKey: cf_tunnel_token
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: cf_tunnel_token }
    {{- end }}
    {{- if .Values.loginAlerts.enabled }}
    - secretKey: discord_webhook_url
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: discord_webhook_url }
    {{- end }}
    {{- if .Values.inviteCode.enabled }}
    - secretKey: signup_invite_code
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: signup_invite_code }
    {{- end }}
    {{- if .Values.adminAuth.enabled }}
    - secretKey: admin_emails
      remoteRef: { key: {{ .Values.externalSecret.vaultPath }}, property: admin_emails }
    {{- end }}
{{- end }}

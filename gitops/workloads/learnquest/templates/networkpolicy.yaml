{{- if .Values.networkPolicy.enabled }}
# Full default-deny + explicit-allow zero-trust for the learnquest namespace.
# LABEL CONVENTION: this chart labels all component pods with
#   `app: learnquest-<component>`  (api, web, worker, redis, cloudflared,
#   migrate — migrate label added by this hardening pass).
# Postgres pods use `cnpg.io/cluster: learnquest-pg` (CNPG convention).
# Selectors here MUST match that, NOT money's `app.kubernetes.io/component`
# scheme — discovered the hard way after every selector missed and
# default-deny silently restricted every component.
---
# 1) Default-deny: ingress none, egress = DNS (with DNS proxy) +
#    intra-namespace + kube-apiserver.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-default-deny
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    # Intra-namespace egress on any port — web -> api, api -> redis svc IP.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    # kube-apiserver egress (CNPG + Cilium identity libs).
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# 2) ingress-nginx + cloudflared -> web.
# IMPORTANT: cloudflared's tunnel config in the Cloudflare dashboard routes
# `learn.giddyland.net` DIRECTLY to learnquest-web.learnquest.svc:3000
# (not via ingress-nginx). So both ingress-nginx (LAN path) AND cloudflared
# (public path) need ingress allows here. Without the cloudflared rule:
# Cloudflare → cloudflared works, but cloudflared → web is dropped at web's
# ingress side → HTTP 502 "Host Error" from Cloudflare.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-ingress-to-web
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-web
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
        - matchLabels:
            app: {{ include "learnquest.name" . }}-cloudflared
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
---
# 3) web + cloudflared -> api.
# Cloudflared's tunnel config routes `learn.giddyland.net/api/*` DIRECTLY
# to learnquest-api.learnquest.svc:8000 (bypassing web's BFF proxy). Without
# allowing cloudflared here, every /api/* request returns 502.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-web-to-api
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: {{ include "learnquest.name" . }}-web
        - matchLabels:
            app: {{ include "learnquest.name" . }}-cloudflared
      toPorts:
        - ports:
            - { port: "{{ .Values.api.port }}", protocol: TCP }
---
# 4) api + worker + migrate -> postgres + redis (EGRESS).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-app-to-data
spec:
  endpointSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - {{ include "learnquest.name" . }}-api
          - {{ include "learnquest.name" . }}-worker
          - {{ include "learnquest.name" . }}-migrate
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app: {{ include "learnquest.name" . }}-redis
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
# 5) worker -> ai-ops/ollama (offline AI factory). Cross-namespace.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-worker-to-ollama
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-worker
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai-ops
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - { port: "11434", protocol: TCP }
---
{{- if eq .Values.ai.factoryProvider "anthropic" }}
# 5b) worker -> Anthropic API.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-worker-to-anthropic
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-worker
  egress:
    - toFQDNs:
        - { matchName: "api.anthropic.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
{{- end }}
# 6) Postgres INGRESS — CNPG operator + learnquest app pods + intra-pg-cluster.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-pg-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
  ingress:
    # CNPG operator
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
            - { port: "9187", protocol: TCP }
    # learnquest app pods (api/worker/migrate) in same namespace
    - fromEndpoints:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - {{ include "learnquest.name" . }}-api
                - {{ include "learnquest.name" . }}-worker
                - {{ include "learnquest.name" . }}-migrate
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    # Intra-Postgres-cluster traffic (streaming replication)
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
---
# 6b) Redis ingress — api + worker.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-redis-ingress
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-redis
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - {{ include "learnquest.name" . }}-api
                - {{ include "learnquest.name" . }}-worker
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
{{- if .Values.cloudflare.tunnel.enabled }}
# 7) cloudflared -> ingress-nginx + Cloudflare edge.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-cloudflared-egress
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-cloudflared
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "80",  protocol: TCP }
            - { port: "443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app: {{ include "learnquest.name" . }}-web
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
    # Cloudflared routes /api/* directly to api (not via web's BFF proxy).
    - toEndpoints:
        - matchLabels:
            app: {{ include "learnquest.name" . }}-api
      toPorts:
        - ports:
            - { port: "{{ .Values.api.port }}", protocol: TCP }
    # Cloudflare edge — see money's networkpolicy.yaml for the gotchas
    # (matchPattern doesn't span dots → need *.v2.argotunnel.com).
    - toFQDNs:
        - { matchPattern: "*.cloudflare.com" }
        - { matchPattern: "*.cfargotunnel.com" }
        - { matchPattern: "*.argotunnel.com" }
        - { matchPattern: "*.v2.argotunnel.com" }
        - { matchPattern: "*.cloudflareclient.com" }
        - { matchPattern: "*.cloudflareresearch.com" }
      toPorts:
        - ports:
            - { port: "443",  protocol: TCP }
            - { port: "7844", protocol: TCP }
            - { port: "7844", protocol: UDP }
---
{{- end }}
# 8) Postgres EGRESS — apiserver + intra-pg + dns + s3 (cond).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-pg-egress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
{{- if .Values.postgres.backup.enabled }}
    - toFQDNs:
        - { matchPattern: "s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.amazonaws.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
{{- end }}
{{- end }}

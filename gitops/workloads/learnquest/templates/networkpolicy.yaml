{{- if .Values.networkPolicy.enabled }}
# Full default-deny + explicit-allow zero-trust for the learnquest namespace.
# Mirrors money's post-hotfix layout: DNS-proxy on default-deny, intra-ns
# egress, kube-apiserver allow, explicit pg + redis ingress, comprehensive
# pg egress (kube-api/dns/intra-pg/cnpg-system/S3), and Cloudflare FQDN
# patterns including *.v2.argotunnel.com for QUIC edges.
---
# 1) Default-deny: ingress none, egress = DNS (with DNS proxy) +
#    intra-namespace + kube-apiserver.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-default-deny
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          # Cilium DNS proxy — REQUIRED for toFQDNs rules below
          # (cloudflared *.cfargotunnel.com / *.v2.argotunnel.com,
          # worker -> api.anthropic.com, postgres -> S3) to actually
          # match. Without this every FQDN-targeted connection drops
          # silently. See docs/runbooks/network-policy-rollout.md.
          rules:
            dns:
              - matchPattern: "*"
    # Intra-namespace egress on any port — web -> api, api -> redis svc IP,
    # etc. Without this default-deny blocks every cross-component call.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    # kube-apiserver egress (preemptive — CNPG + Cilium identity libs).
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
---
# 2) ingress-nginx -> web (the in-cluster LAN path; Cloudflare Tunnel goes
#    the same way per values-homelab.yaml).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-ingress-to-web
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: web
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
---
# 3) web -> api (BFF proxy forwards browser /api calls to api service).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-web-to-api
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: web
      toPorts:
        - ports:
            - { port: "{{ .Values.api.port }}", protocol: TCP }
---
# 4) api + worker + migrate -> postgres + redis (EGRESS).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-app-to-data
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["api", "worker", "migrate"]
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: redis
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
# 5) worker -> ai-ops/ollama (offline AI factory). Cross-namespace.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-worker-to-ollama
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai-ops
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - { port: "11434", protocol: TCP }
---
{{- if eq .Values.ai.factoryProvider "anthropic" }}
# 5b) worker -> Anthropic API (when factoryProvider=anthropic). FQDN egress
#     keeps it tight to api.anthropic.com only.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-worker-to-anthropic
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  egress:
    - toFQDNs:
        - { matchName: "api.anthropic.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
---
{{- end }}
# 6) Postgres INGRESS — CNPG operator + money-app pods + intra-pg-cluster.
#    Without the app-pods rule, the app-to-data egress allow has no matching
#    ingress and connections drop on the postgres side.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-pg-ingress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
  ingress:
    # CNPG operator
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
            - { port: "8000", protocol: TCP }
            - { port: "9187", protocol: TCP }
    # learnquest app pods (api/worker/migrate) in same namespace
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/component
              operator: In
              values: ["api", "worker", "migrate"]
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    # Intra-Postgres-cluster traffic (streaming replication)
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
---
# 6b) Redis ingress — api + worker (default-deny selects redis via instance
#     label; without explicit allow, ingress drops).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-redis-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: redis
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/component
              operator: In
              values: ["api", "worker"]
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
{{- if .Values.cloudflare.tunnel.enabled }}
# 7) cloudflared -> ingress-nginx + Cloudflare edge.
# NOTE: learnquest's cloudflared.yaml template labels pods with
#   { app: learnquest-cloudflared }  (NOT app.kubernetes.io/component).
# So the selector must match `app: <name>-cloudflared`. Money's chart uses
# `app.kubernetes.io/component: cloudflared` — different label scheme.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-cloudflared-egress
spec:
  endpointSelector:
    matchLabels:
      app: {{ include "learnquest.name" . }}-cloudflared
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress-nginx
      toPorts:
        - ports:
            - { port: "80",  protocol: TCP }
            - { port: "443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: web
      toPorts:
        - ports:
            - { port: "{{ .Values.web.port }}", protocol: TCP }
    # Cloudflare edge — see money's networkpolicy.yaml for the gotchas
    # (cftunnel typo + matchPattern not spanning dots → need explicit
    # *.v2.argotunnel.com for QUIC edges at regionN.v2.argotunnel.com).
    - toFQDNs:
        - { matchPattern: "*.cloudflare.com" }
        - { matchPattern: "*.cfargotunnel.com" }
        - { matchPattern: "*.argotunnel.com" }
        - { matchPattern: "*.v2.argotunnel.com" }
        - { matchPattern: "*.cloudflareclient.com" }
        - { matchPattern: "*.cloudflareresearch.com" }
      toPorts:
        - ports:
            - { port: "443",  protocol: TCP }
            - { port: "7844", protocol: TCP }
            - { port: "7844", protocol: UDP }
---
{{- end }}
# 8) Postgres EGRESS — CNPG instance manager needs kube-apiserver +
#    intra-pg-cluster + DNS + S3 (when backup enabled).  Same lesson as
#    money: a policy that selects postgres pods AND only allows S3 egress
#    locks out apiserver and breaks the cluster ("Failing over" loop).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-pg-egress
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    - toEntities: ["kube-apiserver"]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ include "learnquest.name" . }}-pg
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
{{- if .Values.postgres.backup.enabled }}
    - toFQDNs:
        - { matchPattern: "s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.*.amazonaws.com" }
        - { matchPattern: "*.s3.amazonaws.com" }
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
{{- end }}
{{- end }}

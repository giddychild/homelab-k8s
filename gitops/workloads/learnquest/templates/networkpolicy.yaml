{{- if .Values.networkPolicy.enabled }}
# Default-deny + scoped allows (Cilium honors standard NetworkPolicy).
# The single cross-namespace allow: worker -> ai-ops/ollama for the AI factory.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "learnquest.name" . }}-allow
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    # ingress-nginx -> web/api
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
    # intra-namespace (web->api, app->redis/pg)
    - from:
        - podSelector: {}
  egress:
    - to: [{ podSelector: {} }]                       # intra-namespace
    - to:                                             # DNS
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ port: 53, protocol: UDP }]
    - to:                                             # worker -> homelab Ollama (ai-ops)
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ai-ops } }
      ports: [{ port: 11434, protocol: TCP }]
{{- end }}

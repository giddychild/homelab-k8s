# Child Application — homelab ArgoCD (hub) deploys Recall (AI meeting recorder &
# project memory) to the apps-prod cluster (hub-and-spoke), sibling of money/learnquest.
# Chart lives in this public repo (secret-free); app secrets come from Vault via ESO
# (cross-cluster AppRole). App source is the private giddychild/recall repo; images in
# GHCR (pulled via ghcr-pull). Same pattern as learnquest.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recall
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/giddychild/homelab-k8s.git
    targetRevision: main
    path: gitops/workloads/recall
    helm:
      valueFiles:
        - values-homelab.yaml
  destination:
    server: https://192.168.216.204:6443   # apps-prod
    namespace: recall
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CNPG / large CRDs

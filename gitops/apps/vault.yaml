# HashiCorp Vault — central secrets store. Standalone (single node) with file
# storage on Longhorn. Namespace is `privileged` so Vault can use IPC_LOCK (mlock,
# which keeps secrets out of swap). Agent injector disabled — we consume secrets
# via External Secrets Operator instead.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      valuesObject:
        server:
          standalone:
            enabled: true
          dataStorage:
            enabled: true
            size: 2Gi
            storageClass: longhorn
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: vault.apps.giddyland.net
            tls:
              - secretName: vault-tls
                hosts:
                  - vault.apps.giddyland.net
        ui:
          enabled: true
        injector:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

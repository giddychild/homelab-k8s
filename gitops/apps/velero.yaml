# Velero — cluster backup/restore + disaster recovery, to AWS S3.
#
# Backups: File System Backup (kopia) via the node-agent, so PV *contents*
# (Vault, n8n, Grafana, Loki, …) are captured regardless of storage driver,
# plus the Kubernetes resources themselves. Target = S3 bucket in us-east-1.
# (Chose S3 over Cloudflare R2: R2 doesn't implement S3 object tagging, and the
#  AWS-plugin v1.9+ sends an x-amz-tagging header R2 rejects with 501.)
#
# Creds: AWS-style credentials file in Secret `velero-credentials`, templated by
# ESO from Vault `secret/velero` (see gitops/workloads/eso-config/) — none in Git.
#
# Version pin: chart 12.0.1 = Velero 1.18.0, matched with AWS plugin v1.14.1
# (the v1.14.x line targets Velero 1.18.x). Chart 12.x also defaults the CRD-job
# helper to registry.k8s.io/kubectl (11.x used the now-dead bitnamilegacy image).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 12.0.1
    helm:
      valuesObject:
        # Disable the chart's upgrade-only CRD hook job: it pulls a now-dead
        # bitnamilegacy/kubectl image and blocks the sync. The 13 Velero CRDs
        # ship in the chart's crds/ directory, which ArgoCD applies directly.
        # (Trade-off: future chart upgrades may need a manual CRD re-apply.)
        upgradeCRDs: false
        # AWS provider plugin (native S3).
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.14.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
        credentials:
          useSecret: true
          existingSecret: velero-credentials   # ESO-managed (key: cloud)
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: 155125294186-homelab-k8s-backups
              prefix: velero          # Velero owns/validates only this sub-path;
              default: true           # lets etcd-snapshots/ share the bucket safely
              config:
                region: us-east-1
        # We use File System Backup, not volume snapshots → no snapshot location.
        snapshotsEnabled: false
        deployNodeAgent: true                   # node-agent daemonset for kopia FSB
        # Daily backup of everything, FS-backed, kept 3 days.
        schedules:
          daily:
            disabled: false
            schedule: "0 3 * * *"
            template:
              ttl: 72h
              defaultVolumesToFsBackup: true
              includedNamespaces:
                - "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        # node-agent mounts hostPath /var/lib/kubelet/pods and runs privileged.
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true                    # Velero CRDs are large

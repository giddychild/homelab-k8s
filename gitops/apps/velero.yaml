# Velero — cluster backup/restore + disaster recovery, to Cloudflare R2 (S3).
#
# Backups: File System Backup (kopia) via the node-agent, so PV *contents*
# (Vault, n8n, Grafana, Loki, …) are captured regardless of storage driver,
# plus the Kubernetes resources themselves. Target = R2 bucket homelab-k8s-backups.
#
# Creds: AWS-style credentials file in Secret `velero-credentials`, templated by
# ESO from Vault `secret/velero` (see gitops/workloads/eso-config/) — none in Git.
#
# Version pin: chart 12.0.1 = Velero 1.18.0, matched with AWS plugin v1.14.1
# (the v1.14.x line targets Velero 1.18.x). Chart 12.x also defaults the CRD-job
# helper to registry.k8s.io/kubectl (11.x used the now-dead bitnamilegacy image).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 12.0.1
    helm:
      valuesObject:
        # Pin the CRD-install hook's kubectl helper to an explicit, existing tag
        # (avoids any auto-derived tag that might 404 against registry.k8s.io).
        kubectl:
          image:
            repository: registry.k8s.io/kubectl
            tag: v1.36.0
        # AWS provider plugin (S3-compatible → R2).
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.14.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
        credentials:
          useSecret: true
          existingSecret: velero-credentials   # ESO-managed (key: cloud)
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: homelab-k8s-backups
              default: true
              config:
                region: auto                    # R2 uses "auto"
                s3Url: https://cc034994f032b047ae910ab0ec21a075.r2.cloudflarestorage.com
                s3ForcePathStyle: "true"
                checksumAlgorithm: ""           # REQUIRED for R2 (disables CRC checksums)
        # We use File System Backup, not volume snapshots → no snapshot location.
        snapshotsEnabled: false
        deployNodeAgent: true                   # node-agent daemonset for kopia FSB
        # Daily backup of everything, FS-backed, kept 7 days.
        schedules:
          daily:
            disabled: false
            schedule: "0 3 * * *"
            template:
              ttl: 168h
              defaultVolumesToFsBackup: true
              includedNamespaces:
                - "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        # node-agent mounts hostPath /var/lib/kubelet/pods and runs privileged.
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true                    # Velero CRDs are large

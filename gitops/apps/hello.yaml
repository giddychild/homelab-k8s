# Child Application — ArgoCD deploys the hello workload from gitops/workloads/hello.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/giddychild/homelab-k8s.git
    targetRevision: main
    path: gitops/workloads/hello
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true       # delete resources removed from Git
      selfHeal: true    # revert manual drift back to Git state

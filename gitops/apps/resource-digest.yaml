# Resource usage digest → Discord (every 15 min).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-digest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/giddychild/homelab-k8s.git
    targetRevision: main
    path: gitops/workloads/resource-digest
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

# Observability stack (Prometheus + Grafana + Alertmanager + node-exporter +
# kube-state-metrics), deployed by ArgoCD straight from the Helm repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.3.3
    helm:
      valuesObject:
        grafana:
          # Grafana's PVC is ReadWriteOnce, so a RollingUpdate deadlocks (new pod can't
          # attach the volume until the old one releases it → Multi-Attach). Recreate
          # terminates the old pod first, freeing the volume for the new one.
          deploymentStrategy:
            type: Recreate
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.apps.giddyland.net
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.apps.giddyland.net
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          # Admin creds come from a hand-created secret (kept OUT of this public repo).
          # Create it once with:
          #   kubectl -n monitoring create secret generic grafana-admin \
          #     --from-literal=admin-user=admin --from-literal=admin-password=<your-pw>
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          alertmanagerSpec:
            # Mounts the ESO-synced Discord webhook at
            # /etc/alertmanager/secrets/alertmanager-discord/discord_url
            secrets:
              - alertmanager-discord
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
          # Only CRITICAL alerts go to the n8n AI summarizer — CPU inference is slow,
          # so we don't want to summarize every warning/info alert. Everything else
          # falls through to the null receiver (still visible in Alertmanager/Grafana).
          config:
            route:
              group_by: ["namespace", "alertname"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                # All warning/critical alerts → Discord (reliable, no AI dependency).
                - receiver: "discord"
                  matchers:
                    - severity =~ "warning|critical"
                  continue: true
                # Critical also → n8n for the AI summary (existing).
                - receiver: "n8n"
                  matchers:
                    - severity = "critical"
            receivers:
              - name: "null"
              - name: "discord"
                discord_configs:
                  - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/discord_url
                    send_resolved: true
              - name: "n8n"
                webhook_configs:
                  - url: "http://n8n.ai-ops.svc.cluster.local:5678/webhook/alertmanager"
                    send_resolved: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # node-exporter needs hostNetwork/hostPath → namespace must allow privileged.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the prometheus-operator CRDs are too big for client-side apply

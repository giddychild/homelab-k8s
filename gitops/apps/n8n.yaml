# n8n workflow automation — ArgoCD deploys the manifests in gitops/workloads/n8n.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/giddychild/homelab-k8s.git
    targetRevision: main
    path: gitops/workloads/n8n
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-ops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

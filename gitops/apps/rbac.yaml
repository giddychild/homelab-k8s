# RBAC — least-privilege identities (managed by ArgoCD).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/giddychild/homelab-k8s.git
    targetRevision: main
    path: gitops/workloads/rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

# Let's Encrypt ClusterIssuers — publicly-trusted certs via ACME DNS-01 (Cloudflare).
#
# DNS-01 proves domain ownership by writing a temporary TXT record to the
# giddyland.net Cloudflare zone — NO inbound exposure, no open ports, and it works
# for internal-only services (and wildcards, which HTTP-01 cannot do).
#
# The Cloudflare API token lives in Secret `cloudflare-api-token` (cert-manager ns),
# delivered by ESO from Vault (gitops/workloads/eso-config/cloudflare-dns-externalsecret.yaml).
#
# Apply with:  kubectl apply -f kubernetes/bootstrap/cert-manager/letsencrypt-issuers.yaml
# Always validate new setups against STAGING first (lenient rate limits), then prod.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: seyi.obadee@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: seyi.obadee@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token

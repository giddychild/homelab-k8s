# Internal Certificate Authority for the homelab, via cert-manager.
#
# Chain: a SelfSigned issuer mints a long-lived root CA; a CA ClusterIssuer then
# signs per-service leaf certs from that root. Trust `homelab-ca` once on your
# devices and all internal HTTPS is valid.
#
# (Publicly-trusted certs via Let's Encrypt DNS-01 can be added later as another
#  ClusterIssuer — handled in Phase 9.)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-ca
  secretName: homelab-ca-key-pair      # the CA cert + key live here
  duration: 87600h                     # 10 years
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca-issuer
spec:
  ca:
    secretName: homelab-ca-key-pair     # signs leaf certs from the root CA above

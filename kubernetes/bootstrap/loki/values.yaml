# Loki in SingleBinary mode — one pod, filesystem storage on a Longhorn PVC.
# Right-sized for a homelab; scalable mode (read/write/backend + object store) is overkill.

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h   # keep logs 7 days

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi

# Turn off everything that belongs to scalable mode / extras.
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
minio:
  enabled: false

# Auto-register Loki as a Grafana datasource (the kube-prometheus-stack Grafana
# sidecar watches for ConfigMaps labeled grafana_datasource=1).
extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-datasource
      labels:
        grafana_datasource: "1"
    data:
      loki-datasource.yaml: |
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki.monitoring.svc.cluster.local:3100
            isDefault: false

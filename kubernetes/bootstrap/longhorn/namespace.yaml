apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    # Longhorn runs privileged pods; the cluster enforces Pod Security Admission,
    # so this namespace must be allowed to run privileged workloads.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged

# ExternalSecret — Cloudflare API token for cert-manager's ACME DNS-01 solver,
# pulled from the homelab Vault into apps-prod's cert-manager namespace.
# Same Vault path/key as homelab (secret/cloudflare-dns -> property api_token).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-dns
        property: api_token

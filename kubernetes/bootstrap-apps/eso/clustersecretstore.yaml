# ClusterSecretStore for apps-prod — reaches the homelab Vault over the LAN
# (public-trusted LE cert at vault.apps.giddyland.net, so no caBundle needed)
# and authenticates via AppRole (role_id + secret_id in Secret 'vault-approle',
# created by scripts/vault-apps-approle.sh).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.apps.giddyland.net"
      path: "secret"        # KV v2 mount
      version: "v2"
      auth:
        appRole:
          path: "approle"
          roleRef:
            name: "vault-approle"
            namespace: "external-secrets"
            key: "role_id"
          secretRef:
            name: "vault-approle"
            namespace: "external-secrets"
            key: "secret_id"

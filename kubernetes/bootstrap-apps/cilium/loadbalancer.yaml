# apps-prod — Cilium LoadBalancer IPAM + L2 announcements.
#
# Pool 192.168.216.221-.229 is DISTINCT from homelab-prod's .230-.250, so both
# clusters can announce on the same flat L2 segment without ARP conflicts
# (each cluster only answers ARP for its own pool IPs). Ingress is pinned to
# .221 (see kubernetes/bootstrap-apps/ingress-nginx/values.yaml).
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: apps-pool
spec:
  blocks:
    - start: 192.168.216.221
      stop: 192.168.216.229
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: apps-l2
spec:
  loadBalancerIPs: true
  # Announce from worker nodes only (control plane is tainted / kept lean).
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist

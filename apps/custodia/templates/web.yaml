{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custodia-web
  namespace: {{ .Values.namespace }}
  labels: { app: custodia, component: web }
spec:
  replicas: {{ .Values.web.replicas.min }}
  selector:
    matchLabels: { app: custodia, component: web }
  template:
    metadata:
      labels: { app: custodia, component: web }
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets: [{ name: {{ .Values.image.pullSecret }} }]
      {{- end }}
      securityContext: { runAsNonRoot: true, runAsUser: 1000 }
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ .Values.image.web }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 3000 }]
          env:
            - { name: API_INTERNAL_URL, value: "http://custodia-api.{{ .Values.namespace }}.svc" }
          readinessProbe: { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 5 }
          livenessProbe:  { httpGet: { path: /, port: 3000 }, initialDelaySeconds: 10 }
          resources: {{ toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: custodia-web
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: custodia, component: web }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: custodia-web
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: custodia-web }
  minReplicas: {{ .Values.web.replicas.min }}
  maxReplicas: {{ .Values.web.replicas.max }}
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
{{- end }}

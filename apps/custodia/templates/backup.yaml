{{- if .Values.backup.enabled }}
# Nightly logical backup: pg_dump -> gzip -> a dedicated Longhorn PVC, keeping
# the last N days. Self-contained (no object store needed). To restore:
#   gunzip -c /backups/custodia-YYYYMMDD-HHMM.sql.gz | psql "$DATABASE_URL"
# For offsite DR, periodically copy the PVC contents elsewhere.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: custodia-backups
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.backup.storageSize }} } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: custodia-db-backup
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          securityContext: { fsGroup: 999 }
          containers:
            - name: dump
              image: postgres:16-alpine
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef: { name: {{ .Values.database.cluster }}-app, key: uri }
                - { name: RETENTION_DAYS, value: "{{ .Values.backup.retentionDays }}" }
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  ts=$(date +%Y%m%d-%H%M)
                  echo "backing up -> /backups/custodia-$ts.sql.gz"
                  pg_dump "$DATABASE_URL" | gzip > "/backups/custodia-$ts.sql.gz"
                  echo "pruning backups older than ${RETENTION_DAYS}d"
                  find /backups -name 'custodia-*.sql.gz' -mtime +${RETENTION_DAYS} -delete || true
                  ls -lh /backups | tail -n +1
              volumeMounts:
                - { name: backups, mountPath: /backups }
          volumes:
            - name: backups
              persistentVolumeClaim: { claimName: custodia-backups }
{{- end }}

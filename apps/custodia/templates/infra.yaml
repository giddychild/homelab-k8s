# Postgres is a self-contained StatefulSet (see postgres.yaml) — this cluster
# has no CloudNativePG operator. Extensions (pgvector, btree_gist, citext,
# pgcrypto) are created by migration 0001, which runs as the app_user superuser.
{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: custodia-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef: { name: {{ .Values.externalSecrets.store }}, kind: ClusterSecretStore }
  target: { name: custodia-secrets }
  data:
    # DB URL comes from the CNPG-generated secret, not Vault.
    - { secretKey: S3_ACCESS_KEY,         remoteRef: { key: custodia, property: s3_access_key } }
    - { secretKey: S3_SECRET_KEY,         remoteRef: { key: custodia, property: s3_secret_key } }
    - { secretKey: CUSTODIA_ANTHROPIC_API_KEY, remoteRef: { key: custodia, property: anthropic_api_key } }
{{- end }}
{{- if .Values.networkPolicy.enabled }}
---
# Opt-in default-deny for the API pods. Off by default so it can't silently
# block traffic on first deploy; enable once verified working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: custodia-api
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels: { app: custodia, component: api }
  policyTypes: [Ingress, Egress]
  ingress:
    - {}
  egress:
    - to: [{ podSelector: { matchLabels: { app: custodia, component: db } } }]   # Postgres
    - to: [{ podSelector: { matchLabels: { app: ollama } } }]
    - ports: [{ port: 5432 }, { port: 6379 }, { port: 9000 }, { port: 53, protocol: UDP }]
{{- end }}
